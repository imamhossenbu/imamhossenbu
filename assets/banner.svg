<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#0f2027"/>
      <stop offset="70%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .dot { fill: #58a6ff; opacity: 0; }
      .dot-dim { fill: #2a5c8a; opacity: 0; }

      /* Row 1 dots */
      .d1 { animation: blink1 3.2s infinite ease-in-out; }
      .d2 { animation: blink1 2.8s 0.4s infinite ease-in-out; }
      .d3 { animation: blink1 3.5s 0.8s infinite ease-in-out; }
      .d4 { animation: blink1 2.5s 1.2s infinite ease-in-out; }
      .d5 { animation: blink1 3.8s 0.3s infinite ease-in-out; }
      .d6 { animation: blink1 2.9s 1.5s infinite ease-in-out; }
      .d7 { animation: blink1 3.1s 0.7s infinite ease-in-out; }
      .d8 { animation: blink1 2.6s 1.8s infinite ease-in-out; }
      .d9 { animation: blink1 3.4s 0.5s infinite ease-in-out; }
      .d10 { animation: blink1 2.7s 1.1s infinite ease-in-out; }

      /* Row 2 dots */
      .d11 { animation: blink2 3.6s 0.6s infinite ease-in-out; }
      .d12 { animation: blink2 2.4s 1.0s infinite ease-in-out; }
      .d13 { animation: blink2 3.9s 0.2s infinite ease-in-out; }
      .d14 { animation: blink2 2.8s 1.4s infinite ease-in-out; }
      .d15 { animation: blink2 3.2s 0.9s infinite ease-in-out; }
      .d16 { animation: blink2 2.5s 1.6s infinite ease-in-out; }
      .d17 { animation: blink2 3.7s 0.4s infinite ease-in-out; }
      .d18 { animation: blink2 2.9s 1.2s infinite ease-in-out; }
      .d19 { animation: blink2 3.3s 0.8s infinite ease-in-out; }
      .d20 { animation: blink2 2.6s 1.9s infinite ease-in-out; }

      /* Row 3 dots */
      .d21 { animation: blink3 3.0s 1.3s infinite ease-in-out; }
      .d22 { animation: blink3 3.8s 0.1s infinite ease-in-out; }
      .d23 { animation: blink3 2.7s 1.7s infinite ease-in-out; }
      .d24 { animation: blink3 3.5s 0.5s infinite ease-in-out; }
      .d25 { animation: blink3 2.4s 2.0s infinite ease-in-out; }
      .d26 { animation: blink3 3.9s 0.3s infinite ease-in-out; }
      .d27 { animation: blink3 2.6s 1.5s infinite ease-in-out; }
      .d28 { animation: blink3 3.2s 0.7s infinite ease-in-out; }

      /* Floating line connectors */
      .line { stroke: #58a6ff; stroke-width: 0.4; opacity: 0; stroke-dasharray: 4,4; }
      .l1 { animation: lineAnim 4s 0.5s infinite ease-in-out; }
      .l2 { animation: lineAnim 5s 1.5s infinite ease-in-out; }
      .l3 { animation: lineAnim 3.5s 2.5s infinite ease-in-out; }
      .l4 { animation: lineAnim 4.5s 0.8s infinite ease-in-out; }
      .l5 { animation: lineAnim 5.5s 1.8s infinite ease-in-out; }

      /* Text glow pulse */
      .main-title { animation: textPulse 3s infinite ease-in-out; }
      .sub-title { animation: textPulse2 3s 1s infinite ease-in-out; }

      @keyframes blink1 {
        0%, 100% { opacity: 0; r: 2; }
        50% { opacity: 0.9; r: 2.5; }
      }
      @keyframes blink2 {
        0%, 100% { opacity: 0; r: 1.5; }
        50% { opacity: 0.7; r: 2; }
      }
      @keyframes blink3 {
        0%, 100% { opacity: 0; r: 1; }
        50% { opacity: 0.5; r: 1.5; }
      }
      @keyframes lineAnim {
        0%, 100% { opacity: 0; }
        50% { opacity: 0.3; }
      }
      @keyframes textPulse {
        0%, 100% { filter: drop-shadow(0 0 8px #58a6ff88); }
        50% { filter: drop-shadow(0 0 18px #58a6ffcc); }
      }
      @keyframes textPulse2 {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      @keyframes drift {
        0%   { transform: translateY(0px); }
        50%  { transform: translateY(-4px); }
        100% { transform: translateY(0px); }
      }
      .float { animation: drift 4s infinite ease-in-out; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="0"/>
  <rect width="900" height="200" fill="url(#glowCenter)" rx="0"/>

  <!-- Top particle dot row -->
  <circle class="dot d1" cx="30" cy="18" r="2"/>
  <circle class="dot d2" cx="75" cy="12" r="2"/>
  <circle class="dot d3" cx="130" cy="20" r="2"/>
  <circle class="dot d4" cx="190" cy="10" r="2"/>
  <circle class="dot d5" cx="250" cy="22" r="2"/>
  <circle class="dot d6" cx="310" cy="8" r="2"/>
  <circle class="dot d7" cx="370" cy="18" r="2"/>
  <circle class="dot d8" cx="440" cy="12" r="2"/>
  <circle class="dot d9" cx="510" cy="20" r="2"/>
  <circle class="dot d10" cx="580" cy="9" r="2"/>
  <circle class="dot-dim d1" cx="640" cy="18" r="1.5"/>
  <circle class="dot d2" cx="700" cy="11" r="2"/>
  <circle class="dot-dim d3" cx="760" cy="19" r="1.5"/>
  <circle class="dot d4" cx="820" cy="7" r="2"/>
  <circle class="dot-dim d5" cx="875" cy="16" r="1.5"/>

  <!-- Middle scattered dots -->
  <circle class="dot-dim d11" cx="20" cy="95" r="1.5"/>
  <circle class="dot d12" cx="55" cy="80" r="2"/>
  <circle class="dot-dim d13" cx="95" cy="110" r="1.5"/>
  <circle class="dot d14" cx="155" cy="75" r="2"/>
  <circle class="dot-dim d15" cx="210" cy="125" r="1.5"/>
  <!-- right side mid -->
  <circle class="dot d16" cx="720" cy="70" r="2"/>
  <circle class="dot-dim d17" cx="770" cy="105" r="1.5"/>
  <circle class="dot d18" cx="825" cy="80" r="2"/>
  <circle class="dot-dim d19" cx="860" cy="120" r="1.5"/>
  <circle class="dot d20" cx="892" cy="90" r="2"/>

  <!-- Bottom particle dot row -->
  <circle class="dot d21" cx="30" cy="182" r="2"/>
  <circle class="dot-dim d22" cx="85" cy="190" r="1.5"/>
  <circle class="dot d23" cx="150" cy="180" r="2"/>
  <circle class="dot-dim d24" cx="215" cy="192" r="1.5"/>
  <circle class="dot d25" cx="280" cy="183" r="2"/>
  <circle class="dot-dim d26" cx="345" cy="191" r="1.5"/>
  <circle class="dot d27" cx="420" cy="185" r="2"/>
  <circle class="dot-dim d28" cx="490" cy="192" r="1.5"/>
  <circle class="dot d21" cx="560" cy="181" r="2"/>
  <circle class="dot-dim d22" cx="625" cy="190" r="1.5"/>
  <circle class="dot d23" cx="690" cy="184" r="2"/>
  <circle class="dot-dim d24" cx="750" cy="191" r="1.5"/>
  <circle class="dot d25" cx="810" cy="182" r="2"/>
  <circle class="dot-dim d26" cx="865" cy="192" r="1.5"/>
  <circle class="dot d27" cx="892" cy="183" r="2"/>

  <!-- Connector lines -->
  <line class="line l1" x1="30" y1="18" x2="75" y2="12"/>
  <line class="line l2" x1="130" y1="20" x2="190" y2="10"/>
  <line class="line l3" x1="700" y1="11" x2="760" y2="19"/>
  <line class="line l4" x1="820" y1="7" x2="875" y2="16"/>
  <line class="line l5" x1="55" y1="80" x2="30" y2="18"/>

  <!-- Main Text -->
  <g class="float">
    <text
      x="450" y="96"
      text-anchor="middle"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="46"
      font-weight="800"
      letter-spacing="3"
      fill="#ffffff"
      class="main-title"
    >Imam Hossen</text>

    <!-- Underline accent -->
    <rect x="280" y="105" width="340" height="2" rx="1" fill="#58a6ff" opacity="0.6"/>

    <text
      x="450" y="138"
      text-anchor="middle"
      font-family="'Segoe UI', 'Courier New', monospace"
      font-size="16"
      font-weight="400"
      letter-spacing="2"
      fill="#58a6ff"
      class="sub-title"
    >Full Stack Developer  |  Code Craftsman</text>
  </g>

  <!-- Corner accent dots (large glowing) -->
  <circle cx="15" cy="15" r="3.5" fill="#58a6ff" opacity="0.4" filter="url(#blur1)"/>
  <circle cx="885" cy="15" r="3.5" fill="#58a6ff" opacity="0.4" filter="url(#blur1)"/>
  <circle cx="15" cy="185" r="3.5" fill="#58a6ff" opacity="0.4" filter="url(#blur1)"/>
  <circle cx="885" cy="185" r="3.5" fill="#58a6ff" opacity="0.4" filter="url(#blur1)"/>

  <!-- Border frame -->
  <rect x="1" y="1" width="898" height="198" fill="none" stroke="#58a6ff" stroke-width="0.8" stroke-opacity="0.25" rx="4"/>
</svg>
